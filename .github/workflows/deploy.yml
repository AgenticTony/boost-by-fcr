name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # checkout only; wrangler deploys via CLOUDFLARE_API_TOKEN (no GitHub deployment record)

jobs:
  # Build and test public site
  build-public-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/public-site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/public-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build # Hygraph is enabled by default in production builds (see src/api/client.ts); no env injection needed.

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: public-site-dist
          path: ./apps/public-site/dist   # ✅ FIXED: full path from repo root

  # Build and test locked area
  build-locked-area:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/locked-area
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/locked-area/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_HYGRAPH_URL: ${{ secrets.VITE_HYGRAPH_URL }}
          VITE_HYGRAPH_TOKEN: ${{ secrets.VITE_HYGRAPH_TOKEN_LOCKED }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: locked-area-dist
          path: ./apps/locked-area/dist   # ✅ FIXED: full path from repo root

  # Deploy public site to Cloudflare Pages
  deploy-public-site:
    needs: build-public-site
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: public-site-dist
          path: ./dist

      - name: Deploy to Cloudflare Pages
        run: npx -y wrangler@3 pages deploy ./dist --project-name=boost-public-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy locked area to Cloudflare Pages
  deploy-locked-area:
    needs: build-locked-area
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: locked-area-dist
          path: ./dist

      - name: Deploy to Cloudflare Pages
        run: npx -y wrangler@3 pages deploy ./dist --project-name=boost-locked-area
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}